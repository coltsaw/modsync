name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            extension: .exe

          - os: ubuntu-latest
            platform: linux
            extension: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name modsync-${{ matrix.platform }} main.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/modsync-${{ matrix.platform }}${{ matrix.extension }}